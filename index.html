// ── LOGIN PAGE ──
function LoginPage({onLogin}) {
  const [mode,setMode] = useState('pendamping')
  const [username,setUsername] = useState('')
  const [email,setEmail] = useState('')
  const [password,setPassword] = useState('')
  const [err,setErr] = useState('')
  const [loading,setLoading] = useState(false)

  const login = async () => {
    setErr(''); setLoading(true)
    try {
      let loginEmail = ''
      if (mode==='admin') {
        if (!email.trim()) { setErr('Email wajib diisi'); setLoading(false); return }
        loginEmail = email.trim()
      } else {
        if (!username || username.length!==16) { setErr('Username harus 16 digit angka'); setLoading(false); return }
        loginEmail = username+'@danadesa.id'
      }
      if (!password) { setErr('Password wajib diisi'); setLoading(false); return }
      const {data,error} = await sb.auth.signInWithPassword({email:loginEmail, password})
      if (error || !data.user) { setErr('Email/username atau password salah'); setLoading(false); return }
      if (mode==='admin' && !isAdmin(data.user)) { await sb.auth.signOut(); setErr('Akun ini tidak punya akses admin'); setLoading(false); return }
      if (mode==='pendamping' && isAdmin(data.user)) { await sb.auth.signOut(); setErr('Gunakan tab Admin untuk akun ini'); setLoading(false); return }
      onLogin(data.user)
    } catch(e) {
      setErr('Terjadi kesalahan, coba lagi')
    }
    setLoading(false)
  }

  return (
    <div style={{minHeight:'100vh',background:'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
      <div className="card" style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:'1.5rem'}}>
          <div style={{fontSize:40,marginBottom:8}}>🏡</div>
          <h1 style={{fontSize:22,fontWeight:700,color:'#166534'}}>Sistem Dana Desa</h1>
          <p style={{fontSize:13,color:'#6b7280',marginTop:4}}>Transparansi penggunaan anggaran desa</p>
        </div>
        <div style={{display:'flex',background:'#f3f4f6',borderRadius:10,padding:4,marginBottom:'1.5rem'}}>
          {[['pendamping','👤 Pendamping'],['admin','⚙️ Admin']].map(([m,l]) => (
            <button key={m} onClick={()=>{setMode(m);setErr('')}}
              style={{flex:1,padding:8,fontSize:12,border:'none',borderRadius:8,background:mode===m?'white':'transparent',color:mode===m?'#166534':'#6b7280',fontWeight:mode===m?600:400,boxShadow:mode===m?'0 1px 4px rgba(0,0,0,0.1)':'none'}}>
              {l}
            </button>
          ))}
        </div>
        {mode==='admin' ? (
          <div style={{marginBottom:10}}>
            <label style={{fontSize:13,color:'#374151',fontWeight:500,display:'block',marginBottom:6}}>Email Admin</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="admin@danadesa.id"/>
          </div>
        ) : (
          <div style={{marginBottom:10}}>
            <label style={{fontSize:13,color:'#374151',fontWeight:500,display:'block',marginBottom:6}}>Username (16 digit angka)</label>
            <input type="text" inputMode="numeric" maxLength={16} value={username} onChange={e=>setUsername(e.target.value.replace(/\D/g,''))} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="Masukkan username 16 digit" style={{letterSpacing:2}}/>
          </div>
        )}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:13,color:'#374151',fontWeight:500,display:'block',marginBottom:6}}>Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="Masukkan password"/>
        </div>
        <Alert ok={false} text={err}/>
        <button onClick={login} disabled={loading} className="btn-green" style={{width:'100%',padding:12,fontSize:15,opacity:loading?0.7:1}}>
          {loading?'Memproses...':'Masuk'}
        </button>
        <div style={{textAlign:'center',marginTop:12}}>
          <button onClick={()=>onLogin('publik')} style={{fontSize:13,border:'none',background:'none',color:'#2563eb',textDecoration:'underline'}}>
            📊 Lihat dashboard publik
          </button>
        </div>
      </div>
    </div>
  )
}

      'Realisasi Dana Desa (Rp)': kg.realisasi_dd||0,
      'Realisasi Swadaya (Rp)': kg.realisasi_swadaya||0,
      'Total Realisasi (Rp)': (kg.realisasi_dd||0)+(kg.realisasi_swadaya||0),
      '% Realisasi Anggaran': calcPct(kg.realisasi_dd,kg.rencana_dd)+'%',
      'Jumlah Realisasi': kg.realisasi_jumlah||0,
      'Volume Realisasi': kg.realisasi_volume||0,
      '% Realisasi Fisik': (kg.realisasi_pct_fisik||0)+'%',
      'Keterangan': kg.realisasi_keterangan||'',
    }))
    downloadExcel(rows, 'Data Kegiatan - Desa '+desaNama)
  }

  const logout = async () => { await sb.auth.signOut(); onLogout() }

  return (
    <div style={{minHeight:'100vh',background:'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
      <div className="card" style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:'1.5rem'}}>
          <div style={{fontSize:36,marginBottom:8}}>🏘</div>

          <p style={{fontSize:13,color:'#6b7280',marginTop:4}}>Halo, <b>{username}</b>! Masukkan kode desa.</p>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:13,color:'#374151',fontWeight:500,display:'block',marginBottom:6}}>Kode Desa (10 digit angka)</label>

}

function AdminPage({onLogout}) {

  const [dKec,setDKec] = useState('')
  const [dKab,setDKab] = useState('')

  useEffect(() => { loadDesa() }, [])

  const loadDesa = async () => {
    setLoading(true)
    const {data} = await sb.from('desa').select('*').order('nama')
    setDesas(data||[])
    setLoading(false)
  }

  const showMsg = (ok,t) => { setMsg({ok,t}); setTimeout(()=>setMsg(null),4000) }

  const tambahDesa = async () => {
    if (!dNama.trim()) { showMsg(false,'Isi nama desa'); return }
    if (!/^\d{10}$/.test(dKode)) { showMsg(false,'Kode desa harus 10 digit angka'); return }
    if (desas.find(d=>d.kode_desa===dKode)) { showMsg(false,'Kode desa sudah dipakai'); return }
    const {error} = await sb.from('desa').insert([{nama:dNama,kode_desa:dKode,kecamatan:dKec,kabupaten:dKab,anggaran:Number(dAng)||0}])
    if (error) { showMsg(false,error.message); return }
    showMsg(true,`Desa "${dNama}" berhasil ditambahkan`)
    setDNama(''); setDKode(''); setDKec(''); setDKab(''); setDAng('')
    loadDesa()
  }

  const hapusDesa = async (id,nama) => {
    if (!confirm(`Hapus desa ${nama}?`)) return
    const {error} = await sb.from('desa').delete().eq('id',id)

    else { showMsg(true,'Desa berhasil dihapus'); loadDesa() }

  const simpanEditDesa = async () => {
    const {error} = await sb.from('desa').update({

      anggaran:editDesa.anggaran

    if (error) showMsg(false,error.message)

            <button onClick={logout} className="btn-outline" style={{fontSize:13}}>Keluar</button>
          </div>
        </div>

        <div className="tab-bar">
          {[['desa','🏘 Kelola Desa'],['rekap','📊 Rekap']].map(([t,l]) => (
            <button key={t} onClick={()=>setTab(t)} className={`tab-btn${tab===t?' active':''}`}>{l}</button>

        {tab==='desa' && (

// ── FORM KEGIATAN ──
function FormKegiatan({initial, desaId, onSave, onClose}) {
  const [f,setF] = useState(initial ? {...emptyKeg(),...initial} : emptyKeg())
  const [err,setErr] = useState('')
  const [saving,setSaving] = useState(false)

  const s = (k,v) => setF(p=>({...p,[k]:v}))
  const totR  = (f.rencana_dd||0)+(f.rencana_swadaya||0)
  const totRl = (f.realisasi_dd||0)+(f.realisasi_swadaya||0)
  const pctAng = calcPct(f.realisasi_dd, f.rencana_dd)
  const pctFis = f.rencana_volume>0 ? calcPct(f.realisasi_volume, f.rencana_volume) : 0
  const jenisList = f.kategori&&f.jenis_kegiatan_utama ? (JENIS_MAP[f.kategori+'_'+f.jenis_kegiatan_utama]||[]) : []
  const satuan = f.jenis_kegiatan ? (SATUAN_MAP[Number(f.jenis_kegiatan)]||'') : ''

  const simpan = async () => {
    const missing = []
    if (!f.sumber_dana)          missing.push('Sumber Dana')
    if (!f.uraian_apbdes.trim()) missing.push('Uraian APBDes')
    if (!f.uraian_detail.trim()) missing.push('Uraian Detail')
    if (!f.sdgs)                 missing.push('Tagging SDGs')
    if (!f.prioritas)            missing.push('Tagging Prioritas')
    if (!f.kategori)             missing.push('Kategori Kegiatan')
    if (!f.jenis_kegiatan_utama) missing.push('Kegiatan')
    if (!f.jenis_kegiatan)       missing.push('Jenis Kegiatan')
    if (!f.sifat)                missing.push('Sifat Pengadaan')
    if (!f.cara)                 missing.push('Cara Pengadaan')
    if (!f.rencana_dd)           missing.push('Anggaran Dana Desa')
    if (!f.rencana_jumlah)       missing.push('Jumlah Kegiatan')
    if (!f.rencana_volume)       missing.push('Volume Kegiatan')
    if (missing.length>0) { setErr('Wajib diisi: '+missing.join(', ')); return }
    setSaving(true)
    const payload = {...f, desa_id:desaId, rencana_satuan:satuan}
    let error
    if (f.id) {
      ({error} = await sb.from('kegiatan').update(payload).eq('id',f.id))
    } else {
      ({error} = await sb.from('kegiatan').insert([payload]))
    }
    if (error) { setErr(error.message); setSaving(false); return }
    onSave()
    setSaving(false)
  }

  const fld = (label,key,type='text',req=false) => (
    <div>
      <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>{label}{req&&<span style={{color:'red'}}>*</span>}</label>
      <input type={type} value={f[key]||''} onChange={e=>s(key, type==='number'?Number(e.target.value)||0:e.target.value)}/>
    </div>
  )

  const sel = (label,key,opts,req=false,onChange) => (
    <div>
      <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>{label}{req&&<span style={{color:'red'}}>*</span>}</label>
      <select value={f[key]||''} onChange={e=>{s(key,e.target.value); onChange&&onChange(e.target.value)}}>
        <option value="">— Pilih —</option>
        {opts.map(([v,l]) => <option key={v} value={String(v)}>{v}. {l}</option>)}
      </select>
    </div>
  )

  const rbox = (label,val,color='#1d4ed8') => (
    <div>
      <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>{label}</label>
      <div className="read-box" style={{color}}>{val||'—'}</div>
    </div>
  )

  return (
    <div className="modal-bg">
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
          <div style={{fontSize:15,fontWeight:700,color:'#166534'}}>{f.id?'✏️ Edit Kegiatan':'➕ Tambah Kegiatan'}</div>
          <button onClick={onClose} style={{border:'none',background:'none',fontSize:20}}>✕</button>
        </div>

        <div className="sec-box">
          <div className="sec-title">A. Identifikasi Kegiatan</div>
          <div className="grid2" style={{marginBottom:10}}>
            <div>
              <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>Sumber Dana<span style={{color:'red'}}>*</span></label>
              <select value={f.sumber_dana} onChange={e=>s('sumber_dana',e.target.value)}>
                <option value="DDS">DDS</option>
                <option value="SDD">SDD</option>
              </select>
            </div>
            {fld('Kode Induk/Sub Kegiatan','kode_induk')}
            {fld('Kode Rekening','kode_rekening')}
          </div>
          {fld('Uraian APBDes','uraian_apbdes','text',true)}
          <div style={{marginTop:10}}>
            <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>Uraian Detail Kegiatan<span style={{color:'red'}}>*</span></label>
            <textarea value={f.uraian_detail} onChange={e=>s('uraian_detail',e.target.value)} rows={2} style={{resize:'vertical'}}/>
          </div>
        </div>

        <div className="sec-box">
          <div className="sec-title">B. Klasifikasi & Tagging</div>
          <div className="grid2">
            {sel('Tagging SDGs','sdgs',SDGS,true)}
            {sel('Tagging Prioritas','prioritas',PRIORITAS,true)}
            {sel('Kategori Kegiatan','kategori',KATEGORI,true,()=>{s('jenis_kegiatan_utama','');s('jenis_kegiatan','')})}
            <div>
              <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>Kegiatan<span style={{color:'red'}}>*</span></label>
              <select value={f.jenis_kegiatan_utama} onChange={e=>{s('jenis_kegiatan_utama',e.target.value);s('jenis_kegiatan','')}}>
                <option value="">— Pilih —</option>
                <option value="sarpras">Sarpras</option>
                <option value="non_sarpras">Non Sarpras</option>
              </select>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>Jenis Kegiatan<span style={{color:'red'}}>*</span></label>
              {jenisList.length>0
                ? <select value={f.jenis_kegiatan} onChange={e=>s('jenis_kegiatan',e.target.value)}>
                    <option value="">— Pilih —</option>
                    {jenisList.map(([v,l]) => <option key={v} value={String(v)}>{v}. {l}</option>)}
                  </select>
                : <div style={{padding:'8px 10px',border:'1px solid #e5e7eb',borderRadius:8,fontSize:12,color:'#9ca3af'}}>
                    {f.kategori&&f.jenis_kegiatan_utama ? 'Tidak ada pilihan untuk kombinasi ini.' : 'Pilih Kategori dan Kegiatan terlebih dahulu.'}
                  </div>
              }
            </div>
          </div>
        </div>

        <div className="sec-box">
          <div className="sec-title">C. Pengadaan</div>
          <div className="grid2">
            {sel('Sifat Pengadaan','sifat',SIFAT,true)}
            {sel('Cara Pengadaan','cara',CARA,true)}
            {fld('Anggaran APBDes (Rp)','anggaran_apbdes','number')}
          </div>
        </div>

        <div className="sec-box">
          <div className="sec-title">D. Rencana Kegiatan</div>
          <div className="grid2">
            {fld('Anggaran Dana Desa (Rp)','rencana_dd','number',true)}
            {fld('Anggaran Swadaya (Rp)','rencana_swadaya','number')}
            {rbox('Total Anggaran (Rp)',fmtS(totR))}
            {fld('Jumlah Kegiatan','rencana_jumlah','number',true)}
            {rbox('Satuan Kegiatan',satuan)}
            {fld('Volume Kegiatan','rencana_volume','number',true)}
          </div>
        </div>

        <div className="sec-box">
          <div className="sec-title">E. Realisasi Kegiatan</div>
          <div className="grid2">
            {fld('Realisasi Dana Desa (Rp)','realisasi_dd','number')}
            {fld('Realisasi Swadaya (Rp)','realisasi_swadaya','number')}
            {rbox('Total Realisasi (Rp)',fmtS(totRl))}
            {rbox('% Realisasi Anggaran',pctAng+'%',pctColor(pctAng))}
            {fld('Jumlah Realisasi','realisasi_jumlah','number')}
            {fld('Volume Realisasi','realisasi_volume','number')}
            <div>
              <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>% Realisasi Fisik</label>
              <input type="number" min={0} max={100} value={f.realisasi_pct_fisik||0} onChange={e=>s('realisasi_pct_fisik',Math.min(100,Math.max(0,Number(e.target.value)||0)))}/>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label style={{fontSize:12,color:'#374151',display:'block',marginBottom:4,fontWeight:500}}>Keterangan</label>
              <textarea value={f.realisasi_keterangan} onChange={e=>s('realisasi_keterangan',e.target.value)} rows={2} style={{resize:'vertical'}}/>
            </div>
          </div>
        </div>

        <Alert ok={false} text={err}/>
        <div style={{display:'flex',gap:8}}>
          <button onClick={simpan} disabled={saving} className="btn-green" style={{flex:1,padding:12,fontSize:14,opacity:saving?0.7:1}}>
            {saving?'Menyimpan...':'💾 Simpan Kegiatan'}
          </button>
          <button onClick={onClose} className="btn-outline" style={{padding:'12px 20px',fontSize:14}}>Batal</button>
        </div>
      </div>
    </div>
  )
}

function DesaPage({desaId, desaNama, user, onGantiDesa, onLogout}) {

  const [tab,setTab] = useState('input')
  const [kegiatan,setKegiatan] = useState([])
  const [loading,setLoading] = useState(true)
  const [showForm,setShowForm] = useState(false)
  const [editKeg,setEditKeg] = useState(null)
  const [msg,setMsg] = useState(null)
  const [desaInfo,setDesaInfo] = useState(null)
  const [search,setSearch] = useState('')

  useEffect(() => { loadAll() }, [desaId])

  const loadAll = async () => {

      sb.from('kegiatan').select('*').eq('desa_id',desaId).order('created_at')
    ])
    setDesaInfo(d)
    setKegiatan(k||[])
    setLoading(false)
  }

  const showMsg = (ok,t) => { setMsg({ok,t}); setTimeout(()=>setMsg(null),3000) }

  const hapus = async (id) => {
    if (!confirm('Hapus kegiatan ini?')) return
    const {error} = await sb.from('kegiatan').delete().eq('id',id)
    if (error) showMsg(false,error.message)
    else { showMsg(true,'Kegiatan dihapus'); loadAll() }
  }

  const logout = async () => { await sb.auth.signOut(); onLogout() }

  const totA = kegiatan.reduce((s,kg)=>s+(kg.rencana_dd||0),0)
  const totR = kegiatan.reduce((s,kg)=>s+(kg.realisasi_dd||0),0)
  const filtered = kegiatan.filter(kg=>!search||kg.uraian_apbdes?.toLowerCase().includes(search.toLowerCase()))

  return (
    <div style={{minHeight:'100vh',background:'#f0fdf4'}}>
      {showForm && (
        <FormKegiatan
          initial={editKeg}
          desaId={desaId}
          onSave={()=>{ setShowForm(false); setEditKeg(null); showMsg(true,'Kegiatan berhasil disimpan!'); loadAll() }}
          onClose={()=>{ setShowForm(false); setEditKeg(null) }}
        />
      )}
      <div className="wrap">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap',gap:8,paddingTop:'1rem'}}>
          <div>
            <h1 style={{fontSize:18,fontWeight:700,color:'#166534',margin:0}}>🏡 Desa {desaNama}</h1>
            <p style={{fontSize:12,color:'#6b7280',margin:0}}>
              {desaInfo?.kecamatan&&`${desaInfo.kecamatan} · `}{desaInfo?.kabupaten} · Pendamping: <b>{username}</b>
            </p>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={downloadKegiatan} style={{fontSize:13,padding:'7px 16px',borderRadius:8,border:'1px solid #16a34a',background:'#f0fdf4',color:'#166534',fontWeight:500}}>⬇ Download Data</button>
            <button onClick={onGantiDesa} className="btn-outline" style={{fontSize:13}}>🔄 Ganti Desa</button>
            <button onClick={logout} className="btn-outline" style={{fontSize:13}}>Keluar</button>
          </div>
        </div>

        <div className="tab-bar">
          {[['input','📝 Input Kegiatan'],['preview','📊 Pratinjau']].map(([t,l]) => (
            <button key={t} onClick={()=>setTab(t)} className={`tab-btn${tab===t?' active':''}`}>{l}</button>
          ))}
        </div>

        {msg && <Alert ok={msg.ok} text={msg.t}/>}

        {tab==='input' && (
          <>
            <button onClick={()=>{ setEditKeg(null); setShowForm(true) }} className="btn-green" style={{width:'100%',padding:12,fontSize:14,marginBottom:'1rem'}}>
              + Tambah Kegiatan
            </button>
            <div className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
                <div className="sec-title" style={{marginBottom:0}}>Daftar Kegiatan ({kegiatan.length})</div>
                <input placeholder="🔍 Cari uraian..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:180,fontSize:12}}/>
              </div>
              {loading ? <div style={{textAlign:'center',padding:'2rem',color:'#6b7280'}}>Memuat...</div> :
               filtered.length===0 ? <div style={{textAlign:'center',padding:'2rem',color:'#9ca3af',border:'2px dashed #e5e7eb',borderRadius:8}}>Belum ada kegiatan</div> : (
                <div style={{overflowX:'auto'}}>
                  <table>
                    <thead>
                      <tr>
                        <th>No</th><th>Sumber</th><th>Uraian APBDes</th><th>Kategori</th>
                        <th>Jenis</th><th>Ang.DD</th><th>Real.DD</th><th>%Ang</th><th>%Fisik</th><th>Aksi</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((kg,i) => {
                        const katLabel = KATEGORI.find(c=>String(c[0])===String(kg.kategori))
                        const jList = JENIS_MAP[kg.kategori+'_'+kg.jenis_kegiatan_utama]||[]
                        const jLabel = jList.find(j=>String(j[0])===String(kg.jenis_kegiatan))
                        const pA = calcPct(kg.realisasi_dd,kg.rencana_dd)
                        const pF = kg.realisasi_pct_fisik ?? null
                        return (
                          <tr key={kg.id}>
                            <td>{i+1}</td>
                            <td><span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>{kg.sumber_dana}</span></td>
                            <td style={{maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{kg.uraian_apbdes||'-'}</td>
                            <td style={{whiteSpace:'nowrap',fontSize:11}}>{katLabel?katLabel[1]:'-'}</td>
                            <td style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11}}>{jLabel?jLabel[1]:'-'}</td>
                            <td>{fmtS(kg.rencana_dd||0)}</td>
                            <td>{fmtS(kg.realisasi_dd||0)}</td>
                            <td><span style={{fontWeight:700,color:pctColor(pA)}}>{pA}%</span></td>
                            <td><span style={{fontWeight:700,color:pF===null?'#9ca3af':pctColor(pF)}}>{pF===null?'—':pF+'%'}</span></td>
                            <td>
                              <div style={{display:'flex',gap:4}}>
                                <button onClick={()=>{ setEditKeg(kg); setShowForm(true) }} style={{fontSize:11,padding:'4px 8px',border:'1px solid #3b82f6',color:'#3b82f6',background:'white',borderRadius:6}}>✏️</button>
                                <button onClick={()=>hapus(kg.id)} style={{fontSize:11,padding:'4px 8px',border:'1px solid #ef4444',color:'#ef4444',background:'white',borderRadius:6}}>🗑</button>
                              </div>
                            </td>
                          </tr>
                        )
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>
        )}

        {tab==='preview' && (
          <>
            <div className="grid3">
              {[['Total Anggaran DD',fmtS(totA),'#166534'],['Total Realisasi DD',fmtS(totR),'#166534'],['Sisa Anggaran',fmtS(totA-totR),'#92400e'],['Jml Kegiatan',kegiatan.length,'#1d4ed8']].map(([l,v,c]) => (
                <div key={l} className="metric"><div className="metric-label">{l}</div><div className="metric-value" style={{color:c}}>{v}</div></div>
              ))}
            </div>
            <div className="card">
              <div className="sec-title">Ringkasan Kegiatan</div>
              {kegiatan.length===0 ? <div style={{textAlign:'center',color:'#9ca3af',padding:'1rem'}}>Belum ada kegiatan</div> :
               kegiatan.map((kg,i) => {
                const katLabel = KATEGORI.find(c=>String(c[0])===String(kg.kategori))
                const jList = JENIS_MAP[kg.kategori+'_'+kg.jenis_kegiatan_utama]||[]
                const jLabel = jList.find(j=>String(j[0])===String(kg.jenis_kegiatan))
                const pA = calcPct(kg.realisasi_dd,kg.rencana_dd)
                const pF = kg.realisasi_pct_fisik ?? null
                return (
                  <div key={kg.id} style={{marginBottom:12,padding:12,border:'1px solid #e5e7eb',borderRadius:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:6}}>
                      <div style={{fontWeight:600,fontSize:13}}>{i+1}. {kg.uraian_apbdes||'(tanpa uraian)'}</div>
                      <span className="badge" style={{background:'#dbeafe',color:'#1d4ed8'}}>{kg.sumber_dana}</span>
                    </div>
                    <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>{katLabel?katLabel[1]:''}{jLabel?' › '+jLabel[1]:''}</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:12,marginBottom:8}}>
                      <div>Anggaran DD: <b>{fmtS(kg.rencana_dd||0)}</b></div>
                      <div>Realisasi DD: <b>{fmtS(kg.realisasi_dd||0)}</b></div>
                      <div>Vol. Rencana: <b>{kg.rencana_volume||0} {kg.rencana_satuan}</b></div>
                      <div>Vol. Realisasi: <b>{kg.realisasi_volume||0} {kg.rencana_satuan}</b></div>
                    </div>
                    <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                      <div style={{flex:1,minWidth:120}}><div style={{fontSize:11,color:'#6b7280',marginBottom:2}}>% Anggaran</div><Bar p={pA}/></div>
                      {pF!==null && <div style={{flex:1,minWidth:120}}><div style={{fontSize:11,color:'#6b7280',marginBottom:2}}>% Fisik</div><Bar p={pF}/></div>}
                    </div>
                    {kg.realisasi_keterangan && <div style={{fontSize:11,color:'#6b7280',marginTop:6,fontStyle:'italic'}}>📝 {kg.realisasi_keterangan}</div>}
                  </div>
                )
              })}
            </div>
          </>
        )}
      </div>
    </div>
  )
}

// ── PUBLIK PAGE ──
function PublikPage({onBack}) {
  const [desas,setDesas] = useState([])
  const [kegiatan,setKegiatan] = useState([])
  const [loading,setLoading] = useState(true)
  const [search,setSearch] = useState('')

  useEffect(() => {
    (async () => {
      const [{data:d},{data:k}] = await Promise.all([
        sb.from('desa').select('*').order('nama'),
        sb.from('kegiatan').select('*')
      ])
      setDesas(d||[]); setKegiatan(k||[]); setLoading(false)
    })()
  }, [])

  const totA = kegiatan.reduce((s,kg)=>s+(kg.rencana_dd||0),0)
  const totR = kegiatan.reduce((s,kg)=>s+(kg.realisasi_dd||0),0)
  const filtered = desas.filter(d=>!search||d.nama.toLowerCase().includes(search.toLowerCase()))

  const desaStat = (id) => {
    const kgs = kegiatan.filter(k=>k.desa_id===id)
    return {
      totA: kgs.reduce((s,k)=>s+(k.rencana_dd||0),0),
      totR: kgs.reduce((s,k)=>s+(k.realisasi_dd||0),0),
      jml: kgs.length
    }
  }

  return (
    <div style={{minHeight:'100vh',background:'#f0fdf4'}}>
      <div className="wrap">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap',gap:8,paddingTop:'1rem'}}>
          <div>
            <h1 style={{fontSize:18,fontWeight:700,color:'#166534',margin:0}}>📊 Dashboard Publik Dana Desa</h1>
            <p style={{fontSize:12,color:'#6b7280',margin:0}}>Transparansi penggunaan anggaran desa</p>
          </div>
          <button onClick={onBack} className="btn-outline" style={{fontSize:13}}>← Login</button>
        </div>

        <div className="grid3">
          {[['Total Desa',desas.length,'#166534'],['Total Anggaran DD',fmtS(totA),'#166534'],['Total Realisasi DD',fmtS(totR),'#166534'],['Rata-rata Serapan',calcPct(totR,totA)+'%',pctColor(calcPct(totR,totA))]].map(([l,v,c]) => (
            <div key={l} className="metric"><div className="metric-label">{l}</div><div className="metric-value" style={{color:c}}>{v}</div></div>
          ))}
        </div>

        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
            <div className="sec-title" style={{marginBottom:0}}>Rekap per Desa</div>
            <input placeholder="🔍 Cari desa..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:180,fontSize:12}}/>
          </div>
          {loading ? <div style={{textAlign:'center',padding:'2rem',color:'#6b7280'}}>Memuat...</div> : (
            <div style={{overflowX:'auto'}}>
              <table>
                <thead><tr><th>Desa</th><th>Kecamatan</th><th>Kabupaten</th><th>Anggaran DD</th><th>Realisasi DD</th><th>Serapan</th><th>Jml Kegiatan</th></tr></thead>
                <tbody>
                  {filtered.map(d => {
                    const st = desaStat(d.id)
                    return (
                      <tr key={d.id}>
                        <td style={{fontWeight:600}}>{d.nama}</td>
                        <td style={{color:'#6b7280',fontSize:11}}>{d.kecamatan||'-'}</td>
                        <td style={{color:'#6b7280',fontSize:11}}>{d.kabupaten||'-'}</td>
                        <td>{fmtS(st.totA)}</td>
                        <td>{fmtS(st.totR)}</td>
                        <td style={{minWidth:120}}><Bar p={calcPct(st.totR,st.totA)}/></td>
                        <td style={{textAlign:'center'}}>{st.jml}</td>
                      </tr>
                    )
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  )
}

// ── APP UTAMA ──
function App() {
  const [user,setUser] = useState(undefined)
  const [desaId,setDesaId] = useState(null)
  const [desaNama,setDesaNama] = useState(null)

  useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => {
      setUser(session?.user || null)
    })
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session) => {
      setUser(session?.user || null)
      if (!session) { setDesaId(null); setDesaNama(null) }
    })
    return () => subscription.unsubscribe()
  }, [])

  const handleLogout = async () => {
    await sb.auth.signOut()
    setUser(null); setDesaId(null); setDesaNama(null)
  }

  if (user === undefined) return <Loading/>
  if (user === null) return <LoginPage onLogin={u => { if(u==='publik') setUser('publik'); else setUser(u) }}/>
  if (user === 'publik') return <PublikPage onBack={()=>setUser(null)}/>
  if (isAdmin(user)) return <AdminPage onLogout={handleLogout}/>
  if (!desaId) return <PilihDesaPage user={user} onPilihDesa={(id,nama)=>{ setDesaId(id); setDesaNama(nama) }} onLogout={handleLogout}/>
  return <DesaPage desaId={desaId} desaNama={desaNama} user={user} onGantiDesa={()=>{ setDesaId(null); setDesaNama(null) }} onLogout={handleLogout}/>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
